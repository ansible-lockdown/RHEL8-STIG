---

- name: Check OS version and family
  when: not skip_os_check
  tags: always
  ansible.builtin.assert:
    that: (ansible_facts.distribution != 'CentOS' and ansible_facts.os_family == 'RedHat' or ansible_facts.os_family == "Rocky") and ansible_facts.distribution_major_version is version_compare('8', '==')
    fail_msg: "This role can only be run against RHEL/Rocky 8. {{ ansible_facts.distribution }} {{ ansible_facts.distribution_major_version }} is not supported."
    success_msg: "This role is running against a supported OS {{ ansible_facts.distribution }} {{ ansible_facts.distribution_major_version }}"

- name: Check ansible version
  tags: always
  ansible.builtin.assert:
    that: ansible_version.full is version_compare(rhel8stig_min_ansible_version, '>=')
    fail_msg: "You must use Ansible {{ rhel8stig_min_ansible_version }} or greater"
    success_msg: "This role is running a supported version of ansible {{ ansible_version.full }} >= {{ rhel8stig_min_ansible_version }}"

- name: Setup rules if container
  when:
    - ansible_connection == 'docker' or
      ansible_facts.virtualization_type in ["docker", "lxc", "openvz", "podman", "container"]
  tags: always
  block:
    - name: Discover and set container variable if required
      ansible.builtin.set_fact:
        system_is_container: true

    - name: Load variable for container
      ansible.builtin.include_vars:
        file: "{{ container_vars_file }}"

    - name: Output if discovered is a container
      ansible.builtin.debug:
        msg: system has been discovered as a container
      when: system_is_container

- name: "Check password set for connecting user"
  when:
    - rhel8stig_010380
    - ansible_env.SUDO_USER is defined
    - not system_is_ec2
  tags: always
  block:
    - name: Capture current password state of connecting user"
      ansible.builtin.shell: "grep {{ ansible_env.SUDO_USER }} /etc/shadow | awk -F: '{print $2}'"
      changed_when: false
      failed_when: false
      check_mode: false
      register: ansible_user_password_set

    - name: "Assert that password set for {{ ansible_env.SUDO_USER }} and account not locked"  # noqa: name[template]
      ansible.builtin.assert:
        that: ansible_user_password_set.stdout | length != 0 and ansible_user_password_set.stdout != "!!"
        fail_msg: "You have {{ sudo_password_rule }} enabled but the user = {{ ansible_env.SUDO_USER }} has no password set - It can break access"
        success_msg: "You have a password set for the {{ ansible_env.SUDO_USER }}"
      vars:
        sudo_password_rule: RHEL-08-010380  # pragma: allowlist secret

- name: "Ensure superuser for grub does not match existing user"
  when:
    - rhel8stig_010141 or
      rhel8stig_010149
  tags: always
  block:
    - name: "Ensure superuser for grub does not match existing user | capture users"
      ansible.builtin.shell: cat /etc/passwd | cut -d':' -f1
      changed_when: false
      failed_when: false
      check_mode: false
      register: rhel8stig_user_list

    - name: "Ensure superuser for grub does not match existing user"
      ansible.builtin.assert:
        that: rhel8stig_boot_superuser not in rhel8stig_user_list.stdout_lines
        fail_msg: "A unique name must be used for bootloader access user='{{ rhel8stig_boot_superuser }}' already exists refer to variable rhel8stig_boot_superuser"

- name: Include OS specific variables
  tags: always
  ansible.builtin.include_vars:
    file: "{{ ansible_facts.distribution }}.yml"

- name: Check rhel8stig_bootloader_password_hash variable has been changed
  when:
    - not system_is_ec2
    - not system_is_container
    - rhel8stig_010140 or
      rhel8stig_010150
  tags: always
  ansible.builtin.assert:
    that: rhel8stig_bootloader_password_hash != 'grub.pbkdf2.sha512.changethispassword'  # pragma: allowlist secret
    msg: "This role will not be able to run single user password commands as rhel8stig_bootloader_password_hash variable has not been set"  # pragma: allowlist secret

- name: Check if using resolv.conf template settings are changed
  when:
    - rhel8_stig_use_resolv_template
    - rhel8stig_010680
  tags: always
  ansible.builtin.assert:
    that:
      - rhel8_stig_resolv_domain != 'example.com'
      - rhel8_stig_resolv_search | length > 0
    msg: "WARNING!! You are set to change your resolv.conf file this can be very disruptive if not configured correctly"

- name: Gather the package facts
  tags: always
  ansible.builtin.package_facts:
    manager: auto

- name: Include prelim tasks
  tags: always
  ansible.builtin.import_tasks:
    file: prelim.yml

- name: Include CAT I patches
  when: rhel8stig_cat1
  tags:
   - rhel8stig_cat1
   - high
  ansible.builtin.import_tasks:
    file: Cat_1/main.yml

- name: Include CAT II patches
  when: rhel8stig_cat2
  tags:
    - rhel8stig_cat2
    - medium
  ansible.builtin.import_tasks:
    file: Cat_2/main.yml

- name: Include CAT III patches
  when: rhel8stig_cat3
  tags:
    - rhel8stig_cat3
    - low
  ansible.builtin.import_tasks:
    file: Cat_3/main.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Reboot system
  when: change_requires_reboot
  block:
    - name: Reboot system if not skipped
      when: not rhel8stig_skip_reboot
      ansible.builtin.reboot:

    - name: Warning a reboot required but skip option set
      when: rhel8stig_skip_reboot
      ansible.builtin.debug:
        msg: "Warning!! changes have been made that require a reboot to be implemented but skip reboot was set - Can affect compliance check results"
      changed_when: true

- name: Run post remediation audit
  when: run_audit
  tags: always
  ansible.builtin.import_tasks:
    file: post_remediation_audit.yml

- name: Add ansible file showing Benchmark and levels applied
  when: create_benchmark_facts
  tags: always
  block:
    - name: Create ansible facts directory
      ansible.builtin.file:
        path: "{{ ansible_facts_path }}"
        state: directory
        owner: root
        group: root
        mode: 'u=rwx,go=rx'

    - name: Create ansible facts file
      ansible.builtin.template:
        src: etc/ansible/compliance_facts.j2
        dest: "{{ ansible_facts_path }}/compliance_facts.fact"
        owner: root
        group: root
        mode: "u-x,go-wx"

- name: Fetch audit files
  when:
    - fetch_audit_output
    - run_audit
  tags: always
  ansible.builtin.import_tasks:
    file: fetch_audit_output.yml

- name: Show Audit Summary
  when: run_audit
  tags: run_audit
  ansible.builtin.debug:
    msg: "{{ audit_results.split('\n') }}"

- name: If Warnings found Output count and control IDs affected
  when: warn_count != 0
  tags: always
  ansible.builtin.debug:
    msg: You have {{ warn_count }} Warning(s) that require investigating that are related to the following benchmark ID(s) {{ warn_control_list }}
