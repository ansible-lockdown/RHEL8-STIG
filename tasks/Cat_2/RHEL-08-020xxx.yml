---

- name: "MEDIUM | RHEL-08-020000 | AUDIT | RHEL 8 temporary user accounts must be provisioned with an expiration time of 72 hours or less."
  when: rhel_08_020000
  tags:
    - RHEL-08-020000
    - CAT2
    - CCI-000016
    - NIST800-53R4_AC-2
    - SRG-OS-000002-GPOS-00002
    - SV-230331r1017143_rule
    - V-230331
    - accounts
  vars:
    warn_control_id: "MEDIUM | RHEL-08-020000"
  block:
    - name: "MEDIUM | RHEL-08-020000 | AUDIT | RHEL 8 temporary user accounts must be provisioned with an expiration time of 72 hours or less."
      ansible.builtin.debug:
        msg:
          - "WARNING!!  Please check temporary accounts for expiration dates to be 72 hours or less."
          - "To do this please run sudo chage -l account_name for the accounts you need to check"
          - "The results will display the Account Expires information"
          - 'To set account expire run sudo chage -E `date -d "+3 days" +%Y-%m-%d` account_name'

    - name: "MEDIUM | RHEL-08-020000 | AUDIT | RHEL 8 temporary user accounts must be provisioned with an expiration time of 72 hours or less."
      ansible.builtin.import_tasks:
        file: warning_facts.yml

- name: "MEDIUM | RHEL-08-020010 | PATCH | RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur."
  when:
    - rhel_08_020010
    - ansible_distribution_version is version('8.1', '<=')
  tags:
    - RHEL-08-020010
    - CAT2
    - CCI-000044
    - NIST800-53R4_AC-7
    - SRG-OS-000021-GPOS-00005
    - SRG-OS-000329-GPOS-00128
    - SV-230332r1017144_rule
    - V-230332
    - pamd
  block:
    - name: "MEDIUM | RHEL-08-020010 | PATCH | RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur. | Set preauth"  # noqa: jinja[spacing]
      ansible.builtin.lineinfile:
        path: "/etc/pam.d/{{ item }}"
        regexp: ^auth\s+required\s+pam_faillock.so preauth
        line: "auth       required pam_faillock.so preauth dir={{ rhel8stig_pam_faillock_dir }} silent audit deny={{ rhel8stig_pam_faillock_attempts }}{{ (rhel8stig_pam_faillock_fail_for_root) | ternary(' even_deny_root ',' ') }} fail_interval={{ rhel8stig_pam_faillock_interval }} unlock_time={{ rhel8stig_pam_faillock_unlock_time }}"
        insertafter: '^auth'
      notify: Restart sssd
      loop:
        - system-auth
        - password-auth

    - name: "MEDIUM | RHEL-08-020010 | PATCH | RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur. | Set authfail"
      ansible.builtin.lineinfile:
        path: "/etc/pam.d/{{ item }}"
        regexp: '^auth\s+required\s+pam_faillock.so authfail'
        line: 'auth       required pam_faillock.so authfail dir={{ rhel8stig_pam_faillock_dir }} unlock_time={{ rhel8stig_pam_faillock_unlock_time }}'
        insertafter: '^auth'
      notify: Restart sssd
      loop:
        - system-auth
        - password-auth

    - name: "MEDIUM | RHEL-08-020010 | PATCH | RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur. | Set account faillock"
      ansible.builtin.lineinfile:
        path: "/etc/pam.d/{{ item }}"
        regexp: '^account\s+required\s+pam_faillock.so'
        line: 'account    required pam_faillock.so'
        insertafter: '^account'
      notify: Restart sssd
      loop:
        - system-auth
        - password-auth

