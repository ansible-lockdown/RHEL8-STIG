- name: "MEDIUM | RHEL-08-030610 | PATCH | RHEL 8 must allow only the Information System Security Manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited."
  when: rhel8stig_030610
  tags:
    - RHEL-08-030610
    - CAT2
    - CCI-000171
    - NIST800-53R4_AU-12
    - SRG-OS-000063-GPOS-00032
    - SV-230471r1017262_rule
    - V-230471
    - permissions
    - auditd
  block:
    - name: "MEDIUM | RHEL-08-030610 | PATCH | RHEL 8 must allow only the Information System Security Manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited. | Find all custom audit/rules.d files"
      ansible.builtin.find:
        paths: /etc/audit/rules.d/
        file_type: file
        patterns: "*.rules"
        recurse: false
      register: custom_audit_rules

    - name: "MEDIUM | RHEL-08-030610 | PATCH | RHEL 8 must allow only the Information System Security Manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited."
      ansible.builtin.file:
        path: "{{ item }}"
        mode: 'u-x,g-wx,o-rwx'
      with_items:
        - /etc/audit/rules.d/audit.rules
        - /etc/audit/auditd.conf
        - "{{ custom_audit_rules.files | map(attribute='path') | list }}"

