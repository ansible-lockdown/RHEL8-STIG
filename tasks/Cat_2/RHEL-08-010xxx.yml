- name: "MEDIUM | RHEL-08-010580 | PATCH | RHEL 8 must prevent special devices on non-root local partitions."
  when:
    - rhel8stig_010580
  tags:
    - RHEL-08-010580
    - CAT2
    - CCI-000366
    - NIST800-53R4_CM-6
    - SRG-OS-000480-GPOS-00227
    - SV-230301r1017111_rule
    - V-230301
    - mounts
  block:
    - name: "MEDIUM | RHEL-08-010580 | AUDIT | RHEL 8 must prevent special devices on non-root local partitions. | Get mounts"
      ansible.builtin.shell: mount | grep '^/dev\S* on /\S' | grep --invert-match 'nodev' | awk '{print $1,$3,$5,$6}' | sed 's/[()]//g'  # noqa: command-instead-of-module
      changed_when: false
      check_mode: false
      register: discovered_nonroot_mounts_nodev_missing

    - name: "MEDIUM | RHEL-08-010580 | PATCH | RHEL 8 must prevent special devices on non-root local partitions. | Split results"
      when: discovered_nonroot_mounts_nodev_missing.stdout | length > 0
      vars:
        ld_mount_regex: >-
            ^(?P<device>[^'']*)\s(?P<mpoint>[^'']*)\s(?P<fs>[^'']*)\s(?P<opts>[^'']*)
        ld_mount_yaml: |
            device: >-4
                \g<device>
            mpoint: >-4
                \g<mpoint>
            fs: >-4
                \g<fs>
            opts: >-4
                \g<opts>
      ansible.builtin.set_fact:
        discovered_nodev_mounts: "{{ discovered_nonroot_mounts_nodev_missing.stdout_lines | map('regex_replace', ld_mount_regex, ld_mount_yaml) | map('from_yaml') | list }}"
      loop: "{{ discovered_nonroot_mounts_nodev_missing.stdout_lines }}"

    - name: "MEDIUM | RHEL-08-010580 | PATCH | RHEL 8 must prevent special devices on non-root local partitions. | Set value"
      when:
        - item.device != "/"
        - "'nodev' not in item.opts"
        - discovered_nonroot_mounts_nodev_missing.stdout | length > 0
      ansible.posix.mount:
        path: "{{ item.mpoint }}"
        state: mounted
        src: "{{ item.device }}"
        fstype: "{{ item.fs }}"
        opts: "{{ item.opts }},nodev"
      loop: "{{ discovered_nodev_mounts | default([]) }}"
      loop_control:
        label: "{{ item.mpoint }}"

