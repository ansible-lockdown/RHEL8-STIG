---

- name: "MEDIUM | RHEL-08-010010 | PATCH | RHEL 8 vendor packaged system security patches and updates must be installed and up to date."
  when: rhel8stig_010010
  tags:
    - RHEL-08-010010
    - CAT2
    - CCI-000366
    - NIST800-53R4_CM-6
    - SRG-OS-000480-GPOS-00227
    - SV-230222r1017041_rule
    - V-230222
  ansible.builtin.package:
    name: "*"
    state: latest

- name: "MEDIUM | RHEL-08-010019 | PATCH | RHEL 8 must ensure cryptographic verification of vendor software packages."
  when:
    - not system_is_ec2
    - rhel8stig_010019
  tags:
    - RHEL-08-010019
    - CAT2
    - CCI-001749
    - NIST800-53R4_CM-5
    - SRG-OS-000366-GPOS-00153
    - SV-256973r1017373_rule
    - V-256973
  vars:
    warn_control_id: "MEDIUM | RHEL-08-010019"
  block:
    - name: "MEDIUM | RHEL-08-010019 | PATCH | RHEL 8 must ensure cryptographic verification of vendor software packages. | find keys"
      ansible.builtin.shell: "rpm -qa | grep {{ os_gpg_key_pubkey_name }}"  # noqa: command-instead-of-module
      changed_when: false
      failed_when: false
      register: discovered_os_installed_pub_keys

    - name: "MEDIUM | RHEL-08-010019 | PATCH | RHEL 8 must ensure cryptographic verification of vendor software packages. | query keys"
      when: discovered_os_installed_pub_keys.rc == 0
      ansible.builtin.shell: 'rpm -q --queryformat "%{PACKAGER} %{VERSION}\\n" {{ os_gpg_key_pubkey_name }} | grep "{{ os_gpg_key_pubkey_content }}"'  # noqa: command-instead-of-module
      changed_when: false
      failed_when: false
      register: discovered_os_gpg_key_check

    - name: "MEDIUM | RHEL-08-010019 | PATCH | RHEL 8 must ensure cryptographic verification of vendor software packages. | Warning"
      when:
        - discovered_os_installed_pub_keys.rc == 1 or
          discovered_os_gpg_key_check.rc == 1
      ansible.builtin.debug:
        msg: "Warning!! Installed GPG Keys do not meet expected values or expected keys are not installed"

    - name: "MEDIUM | RHEL-08-010019 | PATCH | RHEL 8 must ensure cryptographic verification of vendor software packages. | Warning"
      when:
        - discovered_os_installed_pub_keys.rc == 1 or
          discovered_os_gpg_key_check.rc == 1
      ansible.builtin.import_tasks:
        file: warning_facts.yml

- name: MEDIUM | RHEL-08-010040 | PATCH | RHEL 8 must display the Standard Mandatory DoD Notice and Consent Banner before granting local or remote access to the system via a ssh logon.
  when:
    - rhel8stig_ssh_required
    - rhel8stig_010040
  tags:
    - CAT2
    - RHEL-08-010040
    - CCI-000048
    - NIST800-53R4_AC-8
    - SRG-OS-000023-GPOS-00006
    - SRG-OS-000228-GPOS-00088
    - SV-230225r1017044_rule
    - V-230225
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^#?\s*Banner
    line: 'Banner /etc/issue'
    validate: '/usr/sbin/sshd -T -f %s'

- name: "MEDIUM | RHEL-08-010049 | PATCH | RHEL 8 must display a banner before granting local or remote access to the system via a graphical user logon"
  when: rhel8stig_010049
  tags:
    - RHEL-08-010049
    - CAT2
    - CCI-000048
    - NIST800-53R4_AC-8
    - SRG-OS-000023-GPOS-00006
    - SV-244519r1017326_rule
    - V-244519
    - banner
  ansible.builtin.lineinfile:
    path: /etc/dconf/db/local.d/01-banner-message
    regexp: 'banner-message-enabled='
    line: banner-message-enable=true
    create: true
    mode: 'u-x,go-wx'
    owner: root
    group: root
    insertafter: '[org/gnome/login-screen]'
  notify: Dconf update

- name: "MEDIUM | RHEL-08-010050 | PATCH | RHEL 8 must display the Standard Mandatory DoD Notice and Consent Banner before granting local or remote access to the system via a graphical user logon."
  when:
    - rhel8stig_010050
    - "'dconf' in ansible_facts.packages"
    - rhel8stig_always_configure_dconf
  tags:
    - RHEL-08-010050
    - CAT2
    - CCI-000048
    - NIST800-53R4_AC-8
    - SRG-OS-000023-GPOS-00006
    - SRG-OS-000228-GPOS-00088
    - SV-230226r1017045_rule
    - V-230226
  ansible.builtin.copy:  # noqa: template-instead-of-copy
    dest: /etc/dconf/db/local.d/01-banner-message
    content: |
      [org/gnome/login-screen]
      banner-message-text='{{ rhel8stig_logon_banner | replace(newline, "\n") }}'
      banner-message-enable=true
    mode: 'u-x,go-wx'
    owner: root
    group: root
  vars:
    newline: "\n"
  notify: Dconf update

- name: "MEDIUM | RHEL-08-010060 | PATCH | RHEL 8 must display the Standard Mandatory DoD Notice and Consent Banner before granting local or remote access to the system via a command line user logon"
  when:
    - rhel8stig_010040 or
      rhel8stig_010060
  tags:
    - CAT2
    - RHEL-08-010060
    - CCI-000048
    - NIST800-53R4_AC-8
    - SRG-OS-000023-GPOS-00006
    - SRG-OS-000228-GPOS-00088
    - SV-230227r1017046_rule
    - V-230227
  ansible.builtin.copy:  # noqa: template-instead-of-copy
    dest: "{{ item }}"
    content: "{{ rhel8stig_logon_banner }}"
    owner: root
    group: root
    mode: 'u-x,go-wx'
  loop:
    - /etc/issue
    - /etc/issue.net
  notify: Restart sshd

- name: "MEDIUM | RHEL-08-010070 | PATCH | All RHEL 8 remote access methods must be monitored."
  when: rhel8stig_010070
  tags:
    - RHEL-08-010070
    - CAT2
    - CCI-000067
    - NIST800-53R4_AC-17
    - SRG-OS-000032-GPOS-00013
    - SV-230228r1017047_rule
    - V-230228
    - rsyslog
  ansible.builtin.lineinfile:
    path: /etc/rsyslog.conf
    regexp: ^(?!#).*\/var\/log\/secure
    line: 'auth.*;authpriv.*;daemon.* /var/log/secure'
    create: true
    mode: 'u-x,go-wx'
  notify: Restart rsyslog

# This task wants you to download the latest DoD root certs and place the chain pem in /etc/sssd/pki/sssd_auth_ca_db.pem. This might need to be a message out, but I will circle back to this and confirm.
- name: "MEDIUM | RHEL-08-010090 | AUDIT | RHEL 8, for PKI-based authentication, must validate certificates by constructing a certification path (which includes status information) to an accepted trust anchor."
  when: rhel8stig_010090
  tags:
    - RHEL-08-010090
    - CAT2
    - CCI-000185
    - NIST800-53R4_IA-5
    - SRG-OS-000066-GPOS-00034
    - SRG-OS-000384-GPOS-00167
    - SV-230229r1017048_rule
    - V-230229
    - certificates
  vars:
    warn_control_id: "MEDIUM | RHEL-08-010090"
  block:
    - name: "MEDIUM | RHEL-08-010090 | AUDIT | RHEL 8, for PKI-based authentication, must validate certificates by constructing a certification path (which includes status information) to an accepted trust anchor. | Get current certs"
      ansible.builtin.command: openssl x509 -text -in /etc/sssd/pki/sssd_auth_ca_db.pem
      changed_when: false
      failed_when: false
      register: discovered_certs_list

    - name: "MEDIUM | RHEL-08-010090 | AUDIT | RHEL 8, for PKI-based authentication, must validate certificates by constructing a certification path (which includes status information) to an accepted trust anchor. | Message out certs"
      ansible.builtin.debug:
        msg:
          - "WARNING!! The certs below are the ones applied to this system. Please review and confirm they are the latest issued from the DoD"
          - "If they are not please apply the latest PKI CA certificate bundle from cyber.mil and copy the DoD_PKE_CA_chain.pem into /etc/sssd/pki/sssd_auth_ca_db.pem"
          - "{{ discovered_certs_list.stdout_lines | default('None-found') }}"

    - name: "MEDIUM | RHEL-08-010090 | AUDIT | RHEL 8, for PKI-based authentication, must validate certificates by constructing a certification path (which includes status information) to an accepted trust anchor. | Message out certs"
      ansible.builtin.import_tasks:
        file: warning_facts.yml

- name: "MEDIUM | RHEL-08-010100 | PATCH | RHEL 8, for certificate-based authentication, must enforce authorized access to the corresponding private key."
  when:
    - rhel8stig_010100
    - rhel8stig_ssh_required
  tags:
    - RHEL-08-010100
    - CAT2
    - CCI-000186
    - NIST800-53R4_IA-5
    - SRG-OS-000067-GPOS-00035
    - SV-230230r1017049_rule
    - V-230230
    - sshd
  block:
    - name: "MEDIUM | RHEL-08-010100 | PATCH | RHEL 8, for certificate-based authentication, must enforce authorized access to the corresponding private key. | Create .ssh folder"
      ansible.builtin.file:
        path: "{{ rhel8stig_path_to_sshkey }}"
        state: directory
        mode: 'u+x,go-rwx'

    - name: "MEDIUM | RHEL-08-010100 | PATCH | RHEL 8, for certificate-based authentication, must enforce authorized access to the corresponding private key. | Create key pair"
      community.crypto.openssh_keypair:
        path: "{{ rhel8stig_path_to_sshkey }}/id_rsa"

- name: "MEDIUM | RHEL-08-010110 | PATCH | RHEL 8 must encrypt all stored passwords with a FIPS 140-2 approved cryptographic hashing algorithm."
  when: rhel8stig_010110
  tags:
    - RHEL-08-010110
    - CAT2
    - CCI-000196
    - NIST800-53R4_IA-5
    - SRG-OS-000073-GPOS-00041
    - SV-230231r1017050_rule
    - V-230231
    - login
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^ENCRYPT_METHOD.*'
    line: "ENCRYPT_METHOD {{ rhel8stig_login_defaults.encrypt_method | default('SHA512') }}"
    owner: root
    group: root
    mode: 'u-x,go-wx'

- name: "MEDIUM | RHEL-08-010120 | PATCH | RHEL 8 must employ FIPS 140-2 approved cryptographic hashing algorithms for all stored passwords."
  when: rhel8stig_010120
  tags:
    - RHEL-08-010120
    - CAT2
    - CCI-000196
    - NIST800-53R4_IA-5
    - SRG-OS-000073-GPOS-00041
    - SV-230232r1017051_rule
    - V-230232
    - disruption_high
  vars:
    warn_control_id: "MEDIUM | RHEL-08-010120"
  block:
    - name: "MEDIUM | RHEL-08-010120 | AUDIT | RHEL 8 must employ FIPS 140-2 approved cryptographic hashing algorithms for all stored passwords. | Get user accounts not using FIPS 140-2 hashing"
      ansible.builtin.shell: 'cat /etc/shadow | grep -v "*" | grep -v "!" | grep -v ":$6$" | cut -f1 -d:'
      changed_when: false
      failed_when: false
      register: discovered_non_fips_hashed_accounts

    - name: "MEDIUM | RHEL-08-010120 | PATCH | RHEL 8 must employ FIPS 140-2 approved cryptographic hashing algorithms for all stored passwords. | Lock user not using FIPS 140-2 hashing"
      when:
        - discovered_non_fips_hashed_accounts.stdout | length > 0
        - rhel8stig_disruption_high
      ansible.builtin.command: "passwd -l {{ item }}"
      changed_when: true
      loop: "{{ discovered_non_fips_hashed_accounts.stdout_lines }}"

    - name: "MEDIUM | RHEL-08-010120 | AUDIT | RHEL 8 must employ FIPS 140-2 approved cryptographic hashing algorithms for all stored passwords. | Message out user accounts"
      when:
        - not rhel8stig_disruption_high
        - discovered_non_fips_hashed_accounts.stdout | length > 0
      ansible.builtin.debug:
        msg:
          - "WARNING!! The following accounts do not have FIPS 140-2 hashing. Please review the accounts and correct to conform to control 010120 of the RHEL8 STIG"
          - "{{ discovered_non_fips_hashed_accounts.stdout_lines }}"

    - name: "MEDIUM | RHEL-08-010120 | AUDIT | RHEL 8 must employ FIPS 140-2 approved cryptographic hashing algorithms for all stored passwords. | Message out user accounts"
      when:
        - not rhel8stig_disruption_high
        - discovered_non_fips_hashed_accounts.stdout | length > 0
      ansible.builtin.import_tasks:
        file: warning_facts.yml

- name: "MEDIUM | RHEL-08-010130 | PATCH | The RHEL 8 shadow password suite must be configured to use a sufficient number of hashing rounds."
  when: rhel8stig_010130
  tags:
    - RHEL-08-010130
    - CAT2
    - CCI-000196
    - NIST800-53R4_IA-5
    - SRG-OS-000073-GPOS-00041
    - SV-230233r1044790_rule
    - V-230233
    - pamd
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: ^.*SHA_CRYPT_(MIN|MAX)_ROUNDS\s
    line: "SHA_CRYPT_MIN_ROUNDS {{ rhel8stig_hashing_rounds }}"
    owner: root
    group: root
    mode: 'u-x,go-wx'

- name: |
    "MEDIUM | RHEL-08-010141 | PATCH | RHEL 8 operating systems booted with United Extensible Firmware Interface (UEFI) must require a unique superusers name upon booting into single-user mode and maintenance."
    "MEDIUM | RHEL-08-010149 | PATCH | RHEL 8 operating systems booted with a BIOS must require a unique superusers name upon booting into single-user and maintenance modes."
  when:
    - rhel8stig_010141 or
      rhel8stig_010149
  tags:
    - RHEL-08-010141
    - RHEL-08-010149
    - CAT2
    - CCI-000213
    - NIST800-53R4_AC-3
    - SRG-OS-000080-GPOS-00048
    - SV-244521r1017327_rule
    - SV-244522r1017328_rule
    - V-244521
    - V-244522
    - grub
  ansible.builtin.template:
    src: 01_users.j2
    dest: /etc/grub.d/01_users
    owner: root
    group: root
    mode: 'u+x,go-w'
  notify: Make grub2 config

- name: "MEDIUM | RHEL-08-010151 | PATCH | RHEL 8 operating systems must require authentication upon booting into emergency or rescue modes."
  when: rhel8stig_010151
  tags:
    - RHEL-08-010151
    - CAT2
    - CCI-000213
    - NIST800-53R4_AC-3
    - SRG-OS-000080-GPOS-00048
    - SV-230236r1017055_rule
    - V-230236
    - systemd
  ansible.builtin.lineinfile:
    path: /usr/lib/systemd/system/rescue.service
    regexp: '^ExecStart='
    line: "ExecStart=-/usr/lib/systemd/systemd-sulogin-shell rescue"
    create: true
    owner: root
    group: root
    mode: 'u-x,go-wx'

- name: "MEDIUM | RHEL-08-010152 | PATCH | RHEL 8 operating systems must require authentication upon booting into emergency mode."
  when: rhel8stig_010152
  tags:
    - RHEL-08-010152
    - CAT2
    - CCI-000213
    - NIST800-53R4_AC-3
    - SRG-OS-000080-GPOS-00048
    - SV-244523r1017329_rule
    - V-244523
    - systemd
  ansible.builtin.lineinfile:
    path: /usr/lib/systemd/system/emergency.service
    regexp: '^ExecStart='
    line: "ExecStart=-/usr/lib/systemd/systemd-sulogin-shell emergency"
    create: true
    owner: root
    group: root
    mode: 'u-x,go-wx'

- name: "MEDIUM | RHEL-08-010159 | PATCH | The RHEL 8 pam_unix.so module must be configured in the system-auth file to use a FIPS 140-2 approved cryptographic hashing algorithm for system authentication."
  when: rhel8stig_010159
  tags:
    - RHEL-08-010159
    - CAT2
    - CCI-000803
    - NIST800-53R4_IA-7
    - SRG-OS-000120-GPOS-00061
    - SV-244524r1017330_rule
    - V-244524
    - pamd
  community.general.pamd:
    name: system-auth
    type: password
    control: sufficient
    module_path: pam_unix.so
    module_arguments: sha512
    state: args_present

- name: "MEDIUM | RHEL-08-010160 | PATCH | The RHEL 8 pam_unix.so module must be configured in the password-auth file to use a FIPS 140-2 approved cryptographic hashing algorithm for system authentication."
  when: rhel8stig_010160
  tags:
    - RHEL-08-010160
    - CAT2
    - CCI-000803
    - NIST800-53R4_IA-7
    - SRG-OS-000120-GPOS-00061
    - SV-230237r1017056_rule
    - V-230237
    - pamd
  community.general.pamd:
    name: password-auth
    type: password
    control: sufficient
    module_path: pam_unix.so
    module_arguments: sha512
    state: args_present

- name: "MEDIUM | RHEL-08-010161 | PATCH | RHEL 8 must prevent system daemons from using Kerberos for authentication."
  when: rhel8stig_010161
  tags:
    - RHEL-08-010161
    - CAT2
    - CCI-000803
    - NIST800-53R4_IA-7
    - SRG-OS-000120-GPOS-00061
    - SV-230238r1017057_rule
    - V-230238
    - kerberos
  block:
    - name: "MEDIUM | RHEL-08-010161 | AUDIT | RHEL 8 must prevent system daemons from using Kerberos for authentication. | Find .keytab files"
      ansible.builtin.command: find / -name *.keytab
      changed_when: false
      failed_when: rhel8stig_010161_keytab_files.rc not in [ 0, 1 ]
      register: rhel8stig_010161_keytab_files

    - name: "MEDIUM | RHEL-08-010161 | PATCH | RHEL 8 must prevent system daemons from using Kerberos for authentication. | Remove .keytab files"
      when: rhel8stig_010161_keytab_files.stdout | length > 0
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ rhel8stig_010161_keytab_files.stdout_lines }}"

- name: "MEDIUM | RHEL-08-010162 | PATCH | The krb5-workstation package must not be installed on RHEL 8."
  when: rhel8stig_010162
  tags:
    - RHEL-08-010162
    - CAT2
    - CCI-000803
    - NIST800-53R4_IA-7
    - SRG-OS-000120-GPOS-00061
    - SV-230239r1017058_rule
    - V-230239
    - kerberos
  ansible.builtin.package:
    name: krb5-workstation
    state: absent

- name: "MEDIUM | RHEL-08-010163 | PATCH | The krb5-server package must not be installed on RHEL 8."
  ansible.builtin.package:
    name: krb5-server
    state: absent
  when: rhel8stig_010163
  tags:
    - RHEL-08-010163
    - CAT2
    - CCI-000803
    - NIST800-53R4_IA-7
    - SRG-OS-000120-GPOS-00061
    - SV-237640r1017323_rule
    - V-237640
    - krb5

- name: "MEDIUM | RHEL-08-010170 | PATCH | RHEL8 must use a Linux Security Module configured to enforce limits on system services."
  when:
    - rhel8stig_010170
    - rhel8stig_disruption_high
  tags:
    - CAT2
    - RHEL-08-010170
    - CCI-001084
    - NIST800-53R4_SC-3
    - NIST800-53R4_SI-6
    - SRG-OS-000134-GPOS-00068
    - SV-230240r1017059_rule
    - V-230240
    - selinux
    - disruption_high
  ansible.posix.selinux:
    state: enforcing
    policy: "{{ ansible_selinux.type }}"
  notify: Change_requires_reboot

- name: "MEDIUM | RHEL-08-010190 | PATCH | A sticky bit must be set on all RHEL 8 public directories to prevent unauthorized and unintended information transferred via shared system resources."
  when: rhel8stig_010190
  tags:
    - RHEL-08-010190
    - CAT2
    - CCI-001090
    - NIST800-53R4_SC-4
    - SRG-OS-000138-GPOS-00069
    - SV-230243r1017061_rule
    - V-230243
    - permissions
  block:
    - name: "MEDIUM | RHEL-08-010190 | AUDIT | A sticky bit must be set on all RHEL 8 public directories to prevent unauthorized and unintended information transferred via shared system resources. | Find world-writable directories"
      ansible.builtin.shell: "find / -xdev -type d \\( -perm -0002 -a ! -perm -1000 \\) -print 2>/dev/null | sed 's/.* //'"
      changed_when: false
      failed_when: false
      register: rhel8stig_010190_world_writable_files

    - name: "MEDIUM | RHEL-08-010190 | PATCH | A sticky bit must be set on all RHEL 8 public directories to prevent unauthorized and unintended information transferred via shared system resources. | Set sticky bit to world-writable files"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '+t'
      loop: "{{ rhel8stig_010190_world_writable_files.stdout_lines }}"

- name: "MEDIUM | RHEL-08-010200 | PATCH | RHEL 8 must be configured so that all network connections associated with SSH traffic are terminated at the end of the session or after 10 minutes of inactivity, except to fulfill documented and validated mission requirements."
  when:
    - rhel8stig_010200
    - rhel8stig_ssh_required
  tags:
    - RHEL-08-010200
    - CAT2
    - CCI-001133
    - NIST800-53R4_SC-10
    - SRG-OS-000163-GPOS-00072
    - SRG-OS-000126-GPOS-00066
    - SRG-OS-000279-GPOS-00109
    - SV-230244r1069300_rule
    - V-230244
    - ssh
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^#?\s*ClientAliveCountMax.*
    line: ClientAliveCountMax 1
    validate: '/usr/sbin/sshd -T -f %s'
  notify: Restart sshd

- name: "MEDIUM | RHEL-08-010201 | PATCH | The RHEL 8 SSH daemon must be configured with a timeout interval"
  when:
    - rhel8stig_010201
    - rhel8stig_ssh_required
  tags:
    - RHEL-08-010201
    - CAT2
    - CCI-001133
    - NIST800-53R4_SC-10
    - SRG-OS-000163-GPOS-00072
    - SRG-OS-000126-GPOS-00066
    - SRG-OS-000279-GPOS-00109
    - SV-244525r1017331_rule
    - V-244525
    - ssh
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^#?\s*ClientAliveInterval.*'
    line: "ClientAliveInterval {{ rhel8stig_ssh_session_timeout }}"
    validate: '/usr/sbin/sshd -T -f %s'
  notify: Restart sshd

- name: "MEDIUM | RHEL-08-010210 | PATCH | The RHEL 8 /var/log/messages file must have mode 0640 or less permissive."
  when: rhel8stig_010210
  tags:
    - CAT2
    - RHEL-08-010210
    - CCI-001314
    - NIST800-53R4_SI-11
    - SRG-OS-000206-GPOS-00084
    - SV-230245r1017063_rule
    - V-230245
    - permissions
  ansible.builtin.file:
    path: /var/log/messages
    mode: 'u-x,g-wx,o-rwx'

- name: "MEDIUM | RHEL-08-010220 | PATCH | The RHEL 8 /var/log/messages file must be owned by root."
  when: rhel8stig_010220
  tags:
    - CAT2
    - RHEL-08-010220
    - CCI-001314
    - NIST800-53R4_SI-11
    - SRG-OS-000206-GPOS-00084
    - SV-230246r1017064_rule
    - V-230246
    - permissions
  ansible.builtin.file:
    path: /var/log/messages
    owner: root

- name: "MEDIUM | RHEL-08-010230 | PATCH | The RHEL 8 /var/log/messages file must be group-owned by root."
