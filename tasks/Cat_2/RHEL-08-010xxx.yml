    - CCI-000366
    - NIST800-53R4_CM-6
    - SRG-OS-000480-GPOS-00227
    - SV-230308r1017118_rule
    - V-230308
    - mounts
    - nfs
  ansible.posix.mount:
    path: "{{ item.mount }}"
    fstype: "{{ item.fstype }}"
    src: "{{ item.device }}"
    opts: "{{ item.options }},{% if rhel8stig_010630 is sameas true %}noexec,{% endif %}{% if rhel8stig_010640 is sameas true %}nodev,{% endif %}nosuid"
    state: mounted
  loop: "{{ ansible_facts.mounts }}"

- name: "MEDIUM | RHEL-08-010660 | PATCH | Local RHEL 8 initialization files must not execute world-writable programs."
  when:
    - rhel8stig_010660
    - rhel8stig_disruption_high
  tags:
    - RHEL-08-010660
    - CAT2
    - CCI-000366
    - NIST800-53R4_CM-6
    - SRG-OS-000480-GPOS-00227
    - SV-230309r1017119_rule
    - V-230309
    - permissions
  block:
    - name: "MEDIUM | RHEL-08-010660 | AUDIT | Local RHEL 8 initialization files must not execute world-writable programs. | Find world-writable files on all partitions"
      ansible.builtin.command: find {{ item.mount }} -xdev -type f -perm -002
      changed_when: false
      failed_when: false
      register: discovered_world_writable_files
      with_items: "{{ ansible_mounts }}"
      loop_control:
        label: "{{ item.mount }}"

    - name: "MEDIUM | RHEL-08-010660 | PATCH | Local RHEL 8 initialization files must not execute world-writable programs. | Set fact for flattening"
      ansible.builtin.set_fact:
        discovered_world_writable_files_change_perms: "{{ discovered_world_writable_files.results | map(attribute='stdout_lines') | flatten }}"

    - name: "MEDIUM | RHEL-08-010660 | AUDIT | Local RHEL 8 initialization files must not execute world-writable programs. | Compare to home directories"
      when: discovered_world_writable_files_change_perms != []
      ansible.builtin.include_tasks: audit_homedirinifiles.yml
      loop: "{{ prelim_interactive_homedir_ini_files }}"
      loop_control:
        loop_var: ini_item

    - name: "MEDIUM | RHEL-08-010660 | PATCH | Local RHEL 8 initialization files must not execute world-writable programs. | Set permissions"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: 'u+x,go-w'
        state: file
      loop: "{{ discovered_world_writable_files_change_perms }}"
      when: discovered_world_writable_files_change_perms != []

