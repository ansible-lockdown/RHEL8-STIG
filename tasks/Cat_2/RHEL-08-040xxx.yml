      when:
        - discovered_var_log_status.stdout | length > 0
        - item.mount == '/var/log'
      ansible.posix.mount:
        path: "{{ item.mount }}"
        state: mounted
        src: "{{ item.device }}"
        fstype: "{{ item.fstype }}"
        opts: "defaults{{ rhel_08_040126 | ternary(',nodev', '') }}{{ rhel_08_040127 | ternary(',nosuid', '') }}{{ rhel_08_040128 | ternary(',noexec', '') }}"
