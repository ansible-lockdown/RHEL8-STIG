  tags:
    - RHEL-08-040001
    - CAT2
    - CCI-000381
    - NIST800-53R4_CM-7
    - SRG-OS-000095-GPOS-00049
    - SV-230488r1017272_rule
    - V-230488
    - dnf
    - abrt
  ansible.builtin.package:
    name: "abrt*"
    state: absent

- name: "MEDIUM | RHEL-08-040002 | PATCH | RHEL 8 must not have the sendmail package installed."
  when: rhel_08_040002
  tags:
    - RHEL-08-040002
    - CAT2
    - CCI-00038
    - NIST800-53R4_CM-7
    - SRG-OS-000095-GPOS-00049
    - SV-230489r1017273_rule
    - V-230489
    - dnf
    - sendmail
  ansible.builtin.package:
    name: sendmail
