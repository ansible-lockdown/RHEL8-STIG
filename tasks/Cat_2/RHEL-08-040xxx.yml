- name: "MEDIUM | RHEL-08-040137 | PATCH | The RHEL 8 fapolicy module must be configured to employ a deny-all, permit-by-exception policy to allow the execution of authorized software programs."
  when: rhel_08_040137
  tags:
    - RHEL-08-040137
    - CAT2
    - CCI-001764
