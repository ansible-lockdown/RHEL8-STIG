    - rhel8stig_ssh_required
  tags:
    - RHEL-08-040340
    - CAT2
    - CCI-000366
    - NIST800-53R4_CM-6
    - SRG-OS-000480-GPOS-00227
    - SV-230555r1017317_rule
    - V-230555
    - ssh
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '(?i)^#?\s*X11Forwarding'
    line: 'X11Forwarding no'
    validate: '/usr/sbin/sshd -T -f %s'
  notify: Restart sshd

